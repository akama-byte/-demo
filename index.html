<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Radar Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="shell">
      <section class="hero card">
        <p class="eyebrow">AUTONOMOUS WATCHLIST</p>
        <h1>Stock Radar Daily</h1>
        <p class="subtitle">
          HTML/CSS/JSだけで動く注目銘柄スクリーナー。出来高倍率と値動きから、今日の候補を抽出します。
        </p>
        <div class="hero-actions">
          <button id="runButton" class="btn btn-primary">スクリーニング実行</button>
          <button id="regenButton" class="btn btn-ghost">サンプルデータ再生成</button>
        </div>
      </section>

      <section class="controls card">
        <h2>条件設定</h2>
        <div class="grid">
          <label>
            上位件数
            <input id="topN" type="number" min="1" max="30" value="8" />
          </label>
          <label>
            最低株価 (USD)
            <input id="minPrice" type="number" min="0" step="1" value="30" />
          </label>
          <label>
            最低時価総額 (B)
            <input id="minCap" type="number" min="0" step="1" value="20" />
          </label>
          <label>
            最低出来高倍率
            <input id="minVolRatio" type="number" min="1" step="0.1" value="1.2" />
          </label>
        </div>
      </section>

      <section class="results card">
        <div class="section-head">
          <h2>注目銘柄</h2>
          <p id="updatedAt" class="stamp">未実行</p>
        </div>
        <div id="results" class="result-list"></div>
      </section>

      <section class="report card">
        <div class="section-head">
          <h2>デイリーレポート</h2>
        </div>
        <pre id="reportText" class="report-box">「スクリーニング実行」を押すとレポートを表示します。</pre>
      </section>

      <p class="disclaimer">
        注意: 本アプリの情報は投資助言ではありません。最終判断はご自身で行ってください。
      </p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
